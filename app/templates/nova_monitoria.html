{% extends "base.html" %}

{% block page_title %}Nova monitoria{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <span class="eyebrow">Gestão acadêmica</span>
        <h2>Nova monitoria</h2>
        <p>Vincule uma disciplina a um monitor responsável.</p>
    </div>
</section>

<section class="modern-card">
    <form method="POST">
        <div class="info-box">
            <label>Descrição</label>
            <textarea name="descricao" placeholder="Descrição da monitoria" required></textarea>
        </div>

        <div class="info-box">
            <label>Disciplina</label>
            <select name="disciplina" required>
                <option value="">Selecione</option>
                {% for d in disciplinas %}
                    <option value="{{ d.id }}">{{ d.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="info-box">
            <label>Monitor</label>
            <select name="monitor" required>
                <option value="">Selecione</option>
                {% for u in usuarios %}
                    <option value="{{ u.id }}">{{ u.nome }} - {{ u.email }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="attendance-card-footer">
            <a class="btn btn-small btn-danger" href="{{ url_for('main.listar_monitorias') }}">Cancelar</a>
            <button class="btn btn-large" type="submit">Criar monitoria</button>
        </div>
    </form>
</section>
{% endblock %}
