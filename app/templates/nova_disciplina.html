{% extends "base.html" %}

{% block page_title %}Nova disciplina{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <span class="eyebrow">Gestão acadêmica</span>
        <h2>Nova disciplina</h2>
        <p>Cadastre uma disciplina e vincule o professor responsável.</p>
    </div>
</section>

<section class="modern-card">
    <form method="POST">
        <div class="info-box">
            <label>Nome da disciplina</label>
            <input type="text" name="nome" placeholder="Ex: Cálculo I" required>
        </div>

        <div class="info-box">
            <label>Código da disciplina</label>
            <input type="text" name="codigo" placeholder="Ex: MAT001" required>
        </div>

        <div class="info-box">
            <label>Professor responsável</label>
            <select name="professor_id" required>
                <option value="">Selecione</option>
                {% for professor in professores %}
                    <option value="{{ professor.id }}">{{ professor.nome }} - {{ professor.email }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="attendance-card-footer">
            <a class="btn btn-small btn-danger" href="{{ url_for('main.listar_disciplinas') }}">Cancelar</a>
            <button class="btn btn-large" type="submit">Cadastrar disciplina</button>
        </div>
    </form>
</section>
{% endblock %}
