{% extends "base.html" %}
{% block content %}
<h2>Novo Horário de Monitoria</h2>
<form method="POST">
    <label>Data:</label><br>
    <input type="date" name="data" required><br><br>
    <label>Hora de início:</label><br>
    <input type="time" name="hora_inicio" required><br><br>
    <label>Hora de fim:</label><br>
    <input type="time" name="hora_fim" required><br><br>
    <label>Monitoria:</label><br>
    <select name="monitoria" required>
        <option value="">Selecione</option>
        {% for monitoria in monitorias %}<option value="{{ monitoria.id }}">{{ monitoria.disciplina.nome }} - {{ monitoria.monitor.nome }}</option>{% endfor %}
    </select><br><br>
    <button type="submit">Salvar horário</button>
</form>
<br><a href="{{ url_for('main.listar_horarios') }}">Voltar para horários</a>
{% endblock %}
