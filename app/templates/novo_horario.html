{% extends "base.html" %}

{% block page_title %}Novo horário{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <span class="eyebrow">Agenda acadêmica</span>
        <h2>Novo horário</h2>
        <p>Cadastre uma janela de atendimento para uma monitoria.</p>
    </div>
</section>

<section class="modern-card">
    <form method="POST">
        <div class="info-box">
            <label>Data</label>
            <input type="date" name="data" required>
        </div>

        <div class="info-box">
            <label>Hora de início</label>
            <input type="time" name="hora_inicio" required>
        </div>

        <div class="info-box">
            <label>Hora de fim</label>
            <input type="time" name="hora_fim" required>
        </div>

        <div class="info-box">
            <label>Monitoria</label>
            <select name="monitoria" required>
                <option value="">Selecione</option>
                {% for monitoria in monitorias %}
                    <option value="{{ monitoria.id }}">{{ monitoria.disciplina.nome }} - {{ monitoria.monitor.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="attendance-card-footer">
            <a class="btn btn-small btn-danger" href="{{ url_for('main.listar_horarios') }}">Cancelar</a>
            <button class="btn btn-large" type="submit">Salvar horário</button>
        </div>
    </form>
</section>
{% endblock %}
